name: Move
on:
  workflow_dispatch:
permissions:
      contents: write
jobs:
  move-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Move files from HaitunTV_1.1.0 to root
        run: |
          # 检查目录是否存在
          if [ -d "HaitunTV_1.1.0" ]; then
            # 移动所有内容到根目录
            mv "HaitunTV_1.1.0"/* . 2>/dev/null || true
            mv "HaitunTV_1.1.0"/.* . 2>/dev/null || true
            # 删除空目录
            rmdir "HaitunTV_1.1.0" 2>/dev/null || true
          else
            echo "Directory HaitunTV_1.1.0 does not exist."
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Move files from HaitunTV_1.1.0 to root" || echo "No changes to commit"
          git push
